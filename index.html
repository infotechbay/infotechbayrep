<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banner</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
    }

    .banner {
        background: linear-gradient(135deg, #4facfe, #00f2fe);
        color: white;
        text-align: center;
        padding: 60px 20px;
    }

    .banner h1 {
        font-size: 40px;
        margin-bottom: 10px;
    }

    .banner p {
        font-size: 18px;
        margin-bottom: 20px;
    }

    .banner a {
        text-decoration: none;
        background: white;
        color: #333;
        padding: 12px 25px;
        border-radius: 25px;
        font-weight: bold;
        transition: 0.3s;
    }

    .banner a:hover {
        background: #333;
        color: white;
    }
</style>

</head>
<body>

<div class="banner">
    <h1>Your Business Name</h1>
    <p>Grow your business with a stunning website</p>
    <a href="#">Get Started</a>
</div>

</body>
</html>
